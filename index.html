<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CO₂ Budget Map — Who's Using More Than Their Fair Share?</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- TopoJSON Client (to decode world-atlas data) -->
  <script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>

  <!-- App Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-title">CO₂ <span>Budget Map</span></div>
    <div class="header-subtitle">See how countries compare to a fair per-capita carbon budget</div>
    <span class="header-summary" id="header-summary"></span>
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="de">DE</button>
    </div>
    <button class="header-collapse-btn" id="header-collapse" title="Toggle settings" aria-label="Toggle settings bar">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 11l5-5 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <div class="header-controls">
      <div class="metric-buttons">
        <button class="metric-btn active" data-metric="paris">
          Paris 1.5°C
          <span class="metric-info">?<span class="metric-tooltip">Compares current emissions to a Paris Agreement–aligned budget. The remaining ~350 Gt CO₂ for 1.5°C (IPCC AR6, 50% probability) is split equally per capita and spread to 2050 — giving each person ~1.6 t/year. A ratio of 1× means exactly on track; most countries far exceed it.</span></span>
        </button>
        <button class="metric-btn" data-metric="paris2">
          Paris 2.0°C
          <span class="metric-info">?<span class="metric-tooltip">Same approach but for the 2°C target. The remaining ~1,100 Gt CO₂ (IPCC AR6, 67% probability) spread to 2050 gives each person ~5.0 t/year — a less ambitious but still transformative goal.</span></span>
        </button>
        <button class="metric-btn" data-metric="co2">
          Territorial
          <span class="metric-info">?<span class="metric-tooltip">CO₂ emitted within a country's borders — from power plants, factories, cars, etc. located in that country.</span></span>
        </button>
        <button class="metric-btn" data-metric="cons">
          Consumption
          <span class="metric-info">?<span class="metric-tooltip">CO₂ caused by a country's consumption, including emissions embedded in imports and excluding exports. Reflects a country's lifestyle footprint.</span></span>
        </button>
        <button class="metric-btn" data-metric="hist">
          Historical
          <span class="metric-info">?<span class="metric-tooltip">Cumulative CO₂ emitted since 1750, divided by today's population. This is a rough proxy — it doesn't account for population changes over time, so countries that grew fast (e.g. India) look lower, and slow-growth countries (e.g. UK) look higher. Still, it's the standard way to approximate each country's historical climate debt per person.</span></span>
        </button>
      </div>

      <div class="toggle-switch">
        <label class="switch">
          <input type="checkbox" id="scale-toggle">
          <span class="slider"></span>
        </label>
        <label for="scale-toggle" id="toggle-label">Actual Size</label>
      </div>

      <div class="toggle-switch">
        <label class="switch">
          <input type="checkbox" id="colorblind-toggle">
          <span class="slider"></span>
        </label>
        <label for="colorblind-toggle">Colorblind</label>
      </div>

      <button class="ranking-toggle-btn" id="ranking-toggle" title="Show country ranking">🏆 Ranking</button>
    </div>
  </header>

  <!-- Ranking Panel (left sidebar) -->
  <div id="ranking-panel">
    <div class="ranking-header">
      <h3>Country Ranking</h3>
      <button class="panel-close" id="ranking-close" title="Close">&times;</button>
    </div>
    <div id="ranking-list"></div>
  </div>

  <!-- Map Container -->
  <div id="map"></div>

  <!-- Info Panel (right sidebar) -->
  <div id="info-panel"></div>

  <!-- Legend -->
  <div id="legend"></div>

  <!-- Source Attribution -->
  <div id="attribution">
    Data: <a href="https://github.com/owid/co2-data" target="_blank" rel="noopener">Our World in Data</a> · <a href="https://globalcarbonbudget.org/" target="_blank" rel="noopener">Global Carbon Project</a> (2024)
  </div>

  <!-- Loading Overlay -->
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading map data…</p>
  </div>

  <!-- App Scripts -->
  <script src="js/i18n.js"></script>
  <script src="js/co2data.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
